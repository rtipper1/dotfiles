"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$character"""

palette = "gruvbox_material"

[palettes.gruvbox_material]
fg         = "#D4BE98"
bg0        = "#282828"

red        = "#EA6962"
orange     = "#E78A4E"
yellow     = "#D8A657"
green      = "#A9B665"
aqua       = "#89B482"
blue       = "#7DAEA3"
purple     = "#D3869B"
grey       = "#928374"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DIRECTORY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "fg:aqua"
format = "[$path]($style) "
truncation_length = 10
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ"
"Downloads" = "пҖҷ"
"Music" = "у°қҡ"
"Pictures" = "пҖҫ"
"Developer" = "у°ІӢ"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ GIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# branch icon = red
# branch name = primary blue

[git_branch]
symbol = "пҗҳ "
style = "fg:red"
format = "[[пҗҳ](fg:red) $branch]($style) "

[git_status]
style = "fg:red"
format = '([$all_status]($style) )'
modified = "в—Ҹ"
stashed = ""
staged = ""
renamed = ""
deleted = ""
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ LANGUAGES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[nodejs]
symbol = "оңҳ"
style = "fg:green"
format = "[$symbol]($style) "

[bun]
symbol = "оқҜ"
style = "fg:green"
format = "[$symbol]($style) "

[c]
symbol = "оҳһ"
style = "fg:blue"
format = "[$symbol]($style) "

[cpp]
symbol = "оҳқ"
style = "fg:blue"
format = "[$symbol]($style) "

[rust]
symbol = "оһЁ"
style = "fg:orange"
format = "[$symbol]($style) "

[golang]
symbol = "оҳ§"
style = "fg:aqua"
format = "[$symbol]($style) "

[php]
symbol = "оҳҲ"
style = "fg:purple"
format = "[$symbol]($style) "

[java]
symbol = "оү–"
style = "fg:red"
format = "[$symbol]($style) "

[kotlin]
symbol = "оҳҙ"
style = "fg:purple"
format = "[$symbol]($style) "

[haskell]
symbol = "оҳҹ"
style = "fg:purple"
format = "[$symbol]($style) "

[python]
symbol = "оҳҶ"
style = "fg:yellow"
format = "[$symbol]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CONTAINERS / ENVS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[docker_context]
symbol = "пҢҲ"
style = "fg:blue"
format = "[$symbol]($style) "

[conda]
symbol = "п„Ң"
style = "fg:green"
format = "[$symbol( $environment)]($style) "

[pixi]
symbol = "у°Ҹ—"
style = "fg:aqua"
format = "[$symbol( $environment)]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ PROMPT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](bold fg:aqua)"
error_symbol = "[вқҜ](bold fg:red)"
vimcmd_symbol = "[вқ®](bold fg:yellow)"
